            <button class="btn-done-write" onclick="finishWriting()">Done ✓</button>
          </div>`;
      }
    }
    let wfb="";
    if(S.feedback){
      const f=S.feedback;
      const pfx=f.type==="correct"?"🌟 SUPER! ":f.type==="showAnswer"?"📝 The word is: ":"";
      wfb=`<div class="feedback ${f.type}"><p>${pfx}${f.msg}</p></div>`;
    }
    const wnx=wordDone?`<button class="btn-next" onclick="next()">${S.qIndex+1<numQ?"NEXT! →":"SEE RESULTS! 🌟"}</button>`:"";
    app.innerHTML=`<div class="mav"><div class="card">
      <div class="header-bar">
        <div class="logo">${topic.icon}</div>
        <div class="title-area"><h2 style="font-family:'Fredoka',sans-serif">${topic.name}</h2><div class="subtitle">Q${S.qIndex+1} of ${numQ}</div></div>
        <div class="score-badge">${S.score} ⭐</div>
      </div>
      <div class="streak-bar">${streakDots()}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${(S.qIndex/numQ)*100}%"></div></div>
      <div class="teach-box"><p>🦸 <strong>Hero Tip:</strong> ${q.teach}</p></div>
      <div style="text-align:center"><p style="font-size:15px;color:#64748b;margin-bottom:4px">Your word is:</p>
        <div class="word-flash">${q.word}</div>
      </div>
      ${wordInput}${wfb}${wnx}
      <div style="text-align:center"><button class="btn-back" onclick="goHome()">← Back to missions</button></div>
    </div></div>`;
    // Set up canvas if in draw mode
    if(!wordDone&&q._mode==="draw"&&!q._showCheck){
      const canvas=document.getElementById("write-canvas");
      if(canvas){
        const ctx=canvas.getContext("2d");
        ctx.strokeStyle="#1A1A2E";ctx.lineWidth=5;ctx.lineCap="round";ctx.lineJoin="round";
        // Draw guide line
        ctx.setLineDash([6,4]);ctx.strokeStyle="#e2e8f0";ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(0,120);ctx.lineTo(canvas.width,120);ctx.stroke();
        ctx.setLineDash([]);ctx.strokeStyle="#1A1A2E";ctx.lineWidth=5;
        let drawing=false;
        const pos=(e)=>{
          const r=canvas.getBoundingClientRect();
          const scaleX=canvas.width/r.width;const scaleY=canvas.height/r.height;
          const src=e.touches?e.touches[0]:e;
          return{x:(src.clientX-r.left)*scaleX,y:(src.clientY-r.top)*scaleY};
        };
        const start=(e)=>{e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
        const move=(e)=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();};
        const stop=(e)=>{e.preventDefault();drawing=false;};
        canvas.addEventListener("mousedown",start);canvas.addEventListener("mousemove",move);canvas.addEventListener("mouseup",stop);
        canvas.addEventListener("touchstart",start,{passive:false});canvas.addEventListener("touchmove",move,{passive:false});canvas.addEventListener("touchend",stop,{passive:false});
      }
    }
    return;
  }

  app.innerHTML=`${wrapper}<div class="card">
    <div class="header-bar">
      <div class="logo">${topic.icon}</div>
      <div class="title-area"><h2 style="font-family:'${headerFont}',sans-serif">${topic.name}</h2><div class="subtitle">Q${S.qIndex+1} of ${numQ}</div></div>
      <div class="score-badge">${S.score} ${isMav?"⭐":"pts"}</div>
    </div>
    <div class="streak-bar">${streakDots()}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${(S.qIndex/numQ)*100}%"></div></div>
    <span class="level-badge" style="background:${lc};color:${ltc}">${levelLabel}</span>
    <div class="teach-box"><p>${isMav?"🦸":"📖"} <strong>${isMav?"Hero Tip:":"Learn:"}</strong> ${q.teach}</p></div>
    <div class="question-box"><p>${q.question}</p>${q.visual?`<div class="visual" style="${isMav?'background:#f0f4ff;color:#1A1A2E;padding:20px':''}">${q.visual}</div>`:""}</div>
    ${inp}${hint}${fb}${nx}
    <div style="text-align:center"><button class="btn-back" onclick="goHome()">← Back to ${isMav?"missions":"topics"}</button></div>
  </div></div>`;

  if(!done&&q.type==="number"){const el=document.getElementById("ai");if(el){el.focus();el.value=S.input}}
  if(!done&&q.type==="pic-choice"){const pc=document.querySelector('.pic-choices');if(pc)pc.addEventListener('click',function(e){const btn=e.target.closest('.pic-choice-btn');if(btn)check(btn.dataset.answer)})}
}

// ============ ACTIONS ============
function goLanding(){S={screen:"landing",player:"none",subject:null,topic:null,questions:[],qIndex:0,input:"",hintsUsed:0,feedback:null,score:0,attempts:0,results:[]};render()}

function pickPlayer(p){S.player=p;S.screen="home";render()}

function pickSubject(id){S.subject=id;S.screen="subject-topics";render()}

function goHome(){S.screen="home";S.subject=null;S.topic=null;S.questions=[];S.qIndex=0;S.input="";S.hintsUsed=0;S.feedback=null;S.score=0;S.attempts=0;S.results=[];render()}

function startTopic(id){
  genCounting._call=0;// reset ordering cycle
  genSightWords._queue=null;// reset sight word queue so it reshuffles each session
  S={screen:"quiz",player:S.player,subject:S.subject,topic:id,questions:generateQuiz(id),qIndex:0,input:"",hintsUsed:0,feedback:null,score:0,attempts:0,results:[]};
  render();
}

// ====== WRITE-WORD HELPERS ======
function setWordMode(mode){
  S.questions[S.qIndex]._mode=mode;
  S.questions[S.qIndex]._showCheck=false;
  S.questions[S.qIndex]._drawing=null;
  S.feedback=null;S.input="";
  render();
}

function clearCanvas(){
  const canvas=document.getElementById("write-canvas");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Redraw guide line
  ctx.setLineDash([6,4]);ctx.strokeStyle="#e2e8f0";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,120);ctx.lineTo(canvas.width,120);ctx.stroke();
  // Reset to drawing style so next strokes are dark
  ctx.setLineDash([]);ctx.strokeStyle="#1A1A2E";ctx.lineWidth=5;
}

function finishWriting(){
  const q=S.questions[S.qIndex];
  const canvas=document.getElementById("write-canvas");
  if(!canvas)return;
  q._drawing=canvas.toDataURL();
  q._showCheck=true;
  render();
}

function checkWordType(){
  const q=S.questions[S.qIndex];
  const el=document.getElementById("word-input");
  if(!el)return;
  const uv=el.value.trim().toLowerCase();
  if(!uv)return;
  const ok=uv===q.answer.toLowerCase();
  if(ok){
    S.score++;confetti(getConfettiColors());
    S.feedback={type:"correct",msg:q.explanation};
    S.results.push({correct:true,hintsUsed:0,attempts:S.attempts+1,userAnswer:uv});
  }else{
    S.attempts++;
    if(S.attempts>=getMaxAttempts()){
      S.feedback={type:"showAnswer",msg:`The word is "${q.word}"! Keep practicing! ⭐`};
      S.results.push({correct:false,hintsUsed:0,attempts:S.attempts,userAnswer:uv});
    }else{
      S.feedback={type:"tryAgain",msg:`Almost! Sound it out — "${q.word}" — try again! 💪`};
    }
  }
  render();
}

function checkWrite(wasCorrect){
  const q=S.questions[S.qIndex];
  if(wasCorrect){
    S.score++;confetti(getConfettiColors());
    S.feedback={type:"correct",msg:q.explanation};
    S.results.push({correct:true,hintsUsed:0,attempts:1,userAnswer:q.word});
  }else{
    q._showCheck=false;q._drawing=null;
    S.feedback={type:"tryAgain",msg:`No worries! Clear it and try writing "${q.word}" again! ✏️`};
  }
  render();
}

function check(v){
  const q=S.questions[S.qIndex];
  const isMav=S.player==="mav";
  const maxHints=getMaxHints();
  const maxAttempts=getMaxAttempts();
  let uv;
  if(q.type==="yesno"||q.type==="choice"||q.type==="pic-choice"){uv=v}else{const el=document.getElementById("ai");uv=el?el.value.trim():S.input.trim();S.input=uv}
  if(!uv&&uv!==0)return;
  let ok=false;
  if(q.type==="yesno"){ok=uv.toLowerCase()===q.correctAnswer}
  else if(q.type==="choice"||q.type==="pic-choice"){ok=uv===String(q.answer)}
  else{ok=Math.abs(Number(uv)-q.answer)<0.01}
  // Max: no live feedback — record result silently and auto-advance
  if(!isMav){
    if(ok){S.score++;S.results.push({correct:true,hintsUsed:S.hintsUsed,attempts:1,userAnswer:uv});}
    else{S.results.push({correct:false,hintsUsed:S.hintsUsed,attempts:1,userAnswer:uv});}
    setTimeout(next,400);
    return;
  }
  if(ok){
    S.score++;confetti(getConfettiColors());
    S.feedback={type:"correct",msg:q.explanation};
    S.results.push({correct:true,hintsUsed:S.hintsUsed,attempts:S.attempts+1,userAnswer:uv});
  } else {
    S.attempts++;
    if(S.attempts>=maxAttempts&&S.hintsUsed>=maxHints){
      S.feedback={type:"showAnswer",msg:q.explanation};
      S.results.push({correct:false,hintsUsed:S.hintsUsed,attempts:S.attempts,userAnswer:uv});
    } else {
      S.feedback={type:"tryAgain",msg:S.attempts===1?"Almost! Try again — grab a hint! 💡":"One more try! You can do it, hero! 💪"};
    }
  }
  render();
}

function checkSortOrder(){
  const q=S.questions[S.qIndex];
  const correct=q._order.join(",")===q.sorted.join(",");
  if(correct){
    q._orderDone=true;
    S.feedback=null;
  }else{
    S.attempts++;
    S.feedback={type:"tryAgain",msg:`Not in order yet — keep rearranging!`};
  }
  render();
}

function checkMedianAnswer(){
  const q=S.questions[S.qIndex];
  const el=document.getElementById("median-ans");
  if(!el)return;
  const uv=el.value.trim();
  if(!uv)return;
  const ok=Math.abs(Number(uv)-q.answer)<0.01;
  if(ok){S.score++;S.results.push({correct:true,hintsUsed:S.hintsUsed,attempts:S.attempts+1,userAnswer:uv});}
  else{S.results.push({correct:false,hintsUsed:S.hintsUsed,attempts:S.attempts+1,userAnswer:uv});}
  setTimeout(next,400);
}

function getHint(){
  const q=S.questions[S.qIndex];
  if(S.hintsUsed===0){S.feedback={type:"hint",msg:q.hint1};S.hintsUsed=1}
  else if(S.hintsUsed===1&&S.player==="max"&&q.hint2){S.feedback={type:"hint",msg:q.hint2};S.hintsUsed=2}
  render();
}

function next(){
  const numQ=getNumQ();
  if(S.qIndex+1<S.questions.length){S.qIndex++;S.input="";S.hintsUsed=0;S.feedback=null;S.attempts=0;render()}
  else{S.screen="done";render()}
}

render();
</script>
